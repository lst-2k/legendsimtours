<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Sim Tours</title>
    <style>
        :root {
            --emerald: #2ecc71;
            --grip: #e67e22;
            --links: #3498db;
            --match: #e74c3c;
            --stable: #9b59b6;
            --owgr: #34495e;
            --header-bg: #1a1a1a;
            --sidebar-bg: #ffffff;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg);
            overflow: hidden;
        }

        /* FULL WIDTH STRETCHED HEADER */
        header.top-bar {
            width: 100%;
            background-color: var(--header-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 100;
        }

        .header-content {
            width: 100%;
            text-align: center;
        }

        /* Logo stretches to 100% of the screen width */
        .header-content img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover; /* Ensures it fills area if aspect ratio differs */
        }

        .header-title-bar {
            background: rgba(0,0,0,0.5);
            width: 100%;
            padding: 10px 0;
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Layout Wrapper */
        .wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Persistent Sidebar */
        nav {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .nav-btn {
            border: none;
            color: white;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
        }

        .nav-btn:hover { transform: translateX(5px); filter: brightness(1.1); }
        
        .btn-home { background-color: #444; }
        .btn-emerald { background-color: var(--emerald); }
        .btn-grip { background-color: var(--grip); }
        .btn-links { background-color: var(--links); }
        .btn-match { background-color: var(--match); }
        .btn-stable { background-color: var(--stable); }
        .btn-owgr { background-color: var(--owgr); }

        /* Main Content Area */
        main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .page-content {
            display: none;
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .tour-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .leaderboard-btn {
            background-color: var(--dark-btn, #2c3e50);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            min-height: 250px;
            font-size: 1rem;
            margin-bottom: 20px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .drop-zone {
            width: 100%;
            height: 150px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            color: #999;
        }

        /* Mobile Viewport */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            nav { 
                width: 100%; 
                height: auto; 
                flex-direction: row; 
                overflow-x: auto; 
                white-space: nowrap;
                padding: 10px;
            }
            .nav-btn { padding: 10px 15px; font-size: 0.8rem; }
            main { padding: 15px; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="header-content">
            <img src="logo.png" alt="Legend Sim Tours Banner" onerror="this.src='https://via.placeholder.com/1920x400?text=LEGEND+SIM+TOURS+BANNER'">
        </div>
        <div class="header-title-bar">Legend Sim Tours</div>
    </header>

    <div class="wrapper">
        <nav>
            <button class="nav-btn btn-home" onclick="showPage('home')">Home Area</button>
            <button class="nav-btn btn-emerald" onclick="showPage('emerald')">Emerald Tour</button>
            <button class="nav-btn btn-grip" onclick="showPage('grip')">Grip & Rip</button>
            <button class="nav-btn btn-links" onclick="showPage('links')">Linksland</button>
            <button class="nav-btn btn-match" onclick="showPage('match')">Matchplay</button>
            <button class="nav-btn btn-stable" onclick="showPage('stable')">Stableford</button>
            <button class="nav-btn btn-owgr" onclick="showPage('owgr')">LST OWGR</button>
        </nav>

        <main>
            <div id="home" class="page-content active">
                <h1>Welcome to Legend Sim Tours</h1>
                <div class="card">
                    <p>Enter general tour information, seasonal announcements, or introduction text below.</p>
                    <textarea placeholder="Main tour description..."></textarea>
                    <div class="drop-zone">📸 Drag general images here</div>
                </div>
            </div>

            <div id="tour-view" class="page-content">
                <div class="tour-header">
                    <h1 id="tour-title">Tour Name</h1>
                    <a href="#" id="leaderboard-link" target="_blank" class="leaderboard-btn">Current Leaderboard</a>
                </div>
                <div class="card">
                    <textarea placeholder="Tour-specific details..."></textarea>
                    <div class="drop-zone">📸 Drag images for this tour here</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const tours = {
            emerald: { name: "Emerald Tour", url: "https://lst-2k.github.io/newemeraldtourseason2/" },
            grip: { name: "Grip & Rip", url: "https://geordieboy85.github.io/GripRipRebirth74Leaderboards/" },
            links: { name: "Linksland", url: "https://lst-2k.github.io/linksland/" },
            match: { name: "Matchplay", url: "https://lst-2k.github.io/matchplay/" },
            stable: { name: "Stableford", url: "https://lst-2k.github.io/stableford/" },
            owgr: { name: "LST OWGR", url: "https://lst-2k.github.io/lst-owgr/", btnText: "View Rankings" }
        };

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));

            if (id === 'home') {
                document.getElementById('home').classList.add('active');
            } else {
                const tourData = tours[id];
                const view = document.getElementById('tour-view');
                document.getElementById('tour-title').innerText = tourData.name;
                const linkBtn = document.getElementById('leaderboard-link');
                linkBtn.href = tourData.url;
                linkBtn.innerText = tourData.btnText || "Current Leaderboard";
                view.classList.add('active');
            }
        }
    </script>
</body>
</html>
