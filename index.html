<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Sim Tours</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-default: #f4f4f4;
            --header-bg: #000;
            --sidebar-bg: #333;
            /* Tour Button Colors */
            --emerald: #2e7d32;
            --grip: #d32f2f;
            --links: #0288d1;
            --match: #7b1fa2;
            --stable: #f57c00;
            --owgr: #455a64;
            /* Page Background Shades (Light) */
            --shade-home: #f4f4f4;
            --shade-emerald: #e8f5e9;
            --shade-grip: #ffebee;
            --shade-links: #e1f5fe;
            --shade-match: #f3e5f5;
            --shade-stable: #fff3e0;
            --shade-owgr: #eceff1;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-default);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.4s ease;
        }

        header.top-bar {
            width: 100%;
            background-color: var(--header-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        .header-content { width: 100%; }
        .header-content img { width: 100%; height: auto; display: block; object-fit: cover; }

        .wrapper { display: flex; flex: 1; }

        nav {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
            flex-shrink: 0;
        }

        .nav-btn {
            border: none;
            color: white;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            text-align: left;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-btn:hover { transform: translateX(5px); filter: brightness(1.1); }
        
        .btn-home { background-color: #444; }
        .btn-emerald { background-color: var(--emerald); }
        .btn-grip { background-color: var(--grip); }
        .btn-links { background-color: var(--links); }
        .btn-match { background-color: var(--match); }
        .btn-stable { background-color: var(--stable); }
        .btn-owgr { background-color: var(--owgr); }

        main { flex-grow: 1; padding: 40px; transition: background-color 0.4s ease; }

        .page-content {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        .page-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            line-height: 1.6;
            margin-bottom: 40px;
            text-align: center;
        }

        .crimson-style {
            font-family: 'Crimson Text', serif;
            font-size: 1.35rem;
            color: #2c3e50;
            white-space: pre-line;
            margin-bottom: 30px;
            text-align: left;
        }

        .tour-logo-header {
            width: 100%;
            height: 300px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .leaderboard-btn {
            background-color: var(--owgr);
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            display: inline-block;
            margin-top: 25px;
            margin-bottom: 20px;
        }

        /* Video Player Styling */
        video {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-color: #000;
        }

        .discord-float {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            background-color: #5865F2;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .discord-float:hover { background-color: #4752C4; transform: scale(1.1) rotate(5deg); }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            nav { width: 100%; height: auto; flex-direction: row; overflow-x: auto; position: sticky; top: 0; z-index: 90; }
            .nav-btn { padding: 10px 15px; font-size: 0.8rem; }
            main { padding: 20px; }
            .tour-logo-header { height: 150px; }
            .discord-float { bottom: 15px; left: 15px; width: 45px; height: 45px; }
        }
    </style>
</head>
<body id="body-main">

    <header class="top-bar">
        <div class="header-content">
            <img src="logo.png" alt="Banner">
        </div>
    </header>

    <div class="wrapper">
        <nav>
            <button class="nav-btn btn-home" onclick="showPage('home')">Home Area</button>
            <button class="nav-btn btn-emerald" onclick="showPage('emerald')">Emerald Tour</button>
            <button class="nav-btn btn-grip" onclick="showPage('grip')">Grip & Rip</button>
            <button class="nav-btn btn-links" onclick="showPage('links')">Linksland</button>
            <button class="nav-btn btn-match" onclick="showPage('match')">Matchplay</button>
            <button class="nav-btn btn-stable" onclick="showPage('stable')">Stableford</button>
            <button class="nav-btn btn-owgr" onclick="showPage('owgr')">LST OWGR</button>
        </nav>

        <main id="main-area">
            <div id="home" class="page-content active">
                <div class="card">
                    <div class="crimson-style">
                        Welcome to Legend Sim Tours (LST) Stock 74. We have a few different societies in here, they are all using the stock 74 golfer...
                        (Your full welcome text here)
                    </div>
                    <img src="settings.png" alt="Settings" style="width:100%; border-radius:8px;" onerror="this.style.display='none'">
                </div>
            </div>

            <div id="tour-view" class="page-content">
                <div class="tour-header" style="text-align: center;">
                    <div id="title-container"></div>
                    <a href="#" id="leaderboard-link" target="_blank" class="leaderboard-btn">Current Leaderboard</a>
                </div>

                <div id="video-card" class="card" style="display: none;">
                    <h2 style="margin-top:0;">Tournament Highlights</h2>
                    <video id="tour-video" controls>
                        <source id="video-source" src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </main>
    </div>

    <a href="https://discord.gg/HxGJk9HRC3" target="_blank" class="discord-float" title="Join our Discord">
        <svg width="28" height="28" viewBox="0 0 127.14 96.36" fill="white"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.06,72.06,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.71,32.65-1.82,56.6.48,80.21a105.73,105.73,0,0,0,32.22,16.15,77.7,77.7,0,0,0,7.34-11.86,68.11,68.11,0,0,1-11.85-5.65c.99-.71,1.96-1.47,2.88-2.26a74.35,74.35,0,0,0,52.15,0c.92.79,1.89,1.55,2.88,2.26a67.85,67.85,0,0,1-11.85,5.65,76.91,76.91,0,0,0,7.34,11.86,105.55,105.55,0,0,0,32.27-16.15C129.58,52.84,124.93,28.93,107.7,8.07ZM42.45,65.69c-6.22,0-11.38-5.71-11.38-12.7s5-12.7,11.38-12.7,11.51,5.71,11.51,12.7S48.8,65.69,42.45,65.69Zm42.24,0c-6.22,0-11.38-5.71-11.38-12.7s5-12.7,11.38-12.7,11.51,5.71,11.51,12.7S91,65.69,84.69,65.69Z"/></svg>
    </a>

    <script>
        const tours = {
            home: { shade: "var(--shade-home)" },
            emerald: { name: "Emerald Tour", url: "https://lst-2k.github.io/newemeraldtourseason2/", logo: "emeraldlogo.png", shade: "var(--shade-emerald)", video: "emerald-hio.mp4" },
            grip: { name: "Grip & Rip", url: "https://geordieboy85.github.io/GripRipRebirth74LeaderboardS6/", logo: "gripnriplogo.png", shade: "var(--shade-grip)", video: "longpole chip in.mp4" },
            links: { name: "Linksland", url: "https://lst-2k.github.io/linksland/", logo: "linkslandlogo.png", shade: "var(--shade-links)" },
            match: { name: "Matchplay", url: "https://lst-2k.github.io/matchplay/", logo: "matchplaylogo.png", shade: "var(--shade-match)" },
            stable: { name: "Stableford", url: "https://lst-2k.github.io/stableford/", logo: "stablefordlogo.png", shade: "var(--shade-stable)" },
            owgr: { name: "LST OWGR", url: "https://lst-2k.github.io/lst-owgr/", btnText: "View Rankings", shade: "var(--shade-owgr)" }
        };

        function showPage(id) {
            const data = tours[id];
            
            // Update Page Background Color
            document.getElementById('body-main').style.backgroundColor = data.shade;
            document.getElementById('main-area').style.backgroundColor = data.shade;

            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (id === 'home') {
                document.getElementById('home').classList.add('active');
            } else {
                const view = document.getElementById('tour-view');
                const titleContainer = document.getElementById('title-container');
                const videoCard = document.getElementById('video-card');
                const videoElement = document.getElementById('tour-video');
                const videoSource = document.getElementById('video-source');

                // Set Logo
                titleContainer.innerHTML = data.logo ? 
                    `<img src="${data.logo}" class="tour-logo-header" onerror="this.outerHTML='<h1>${data.name}</h1>'">` : 
                    `<h1>${data.name}</h1>`;

                // Set Leaderboard Link
                const linkBtn = document.getElementById('leaderboard-link');
                linkBtn.href = data.url;
                linkBtn.innerText = data.btnText || "Current Leaderboard";

                // Set Video (if exists)
                if (data.video) {
                    videoSource.src = data.video;
                    videoElement.load(); 
                    videoCard.style.display = 'block';
                } else {
                    videoCard.style.display = 'none';
                }

                view.classList.add('active');
            }
        }
    </script>
</body>
</html>
