<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LST Legends Sim Tours</title>
    
    <script>
        const APP_VERSION = '1.1.1'; 

        const tours = {
            home: { shade: "#f4f4f4" },
            emerald: { 
                name: "Emerald Tour", 
                url: "https://lst-2k.github.io/newemeraldtourseason2/", 
                logo: "emeraldlogo.png", 
                shade: "#004d00",
                settingsImage: "emeraldsettings.png",
                description: `NEW EMERALD TOUR - SEASON 2\n\nJoin the excitement in our 12-week season featuring signature events and leaderboards.`,
                videos: [] 
            },
            grip: { 
                name: "Grip & Rip", 
                url: "https://geordieboy85.github.io/GripRipRebirth74LeaderboardS6/", 
                logo: "gripnriplogo.png", 
                shade: "#b30000",
                settingsImage: "gripnripsettings.png",
                videos: [{file: "longpole chip in.mp4", title: "Longpole Chips In" }] 
            },
            links: { 
                name: "Linksland",
                url: "https://lst-2k.github.io/linksland/",
                logo: "linkslandlogo.png",
                shade: "#003366",
                settingsImage: "linkslandsettings.png",
                videos: []
            },
            match: { 
                name: "Matchplay",
                url: "https://lst-2k.github.io/matchplayseason3/",
                logo: "matchplaylogo.png",
                shade: "#4b0082",
                description: `LST Matchplay Championship. Season 3 is now live!`,
                archive: [
                    { name: "Season 2", url: "https://lst-2k.github.io/matchplayseason2/" },
                    { name: "Season 1", url: "https://lst-2k.github.io/matchplayseason1/" }
                ],
                settingsImage: "matchplaysettings.png",
                videos: []
            },
            stable: { 
                name: "Stableford",
                url: "https://lst-2k.github.io/stableford/",
                logo: "stablefordlogo.png",
                shade: "#ff8c00",
                settingsImage: "stablefordsettings.png",
                videos: []
            },
            owgr: { 
                name: "LST OWGR",
                url: "https://lst-2k.github.io/lst-owgr/",
                logo: "owgr.png",
                btnText: "View Full Rankings",
                shade: "#222222",
                description: `LST-2k25 Official World Golf Rankings are LIVE!`,
                videos: [] 
            }
        };

        function toggleHistory(header) {
            const content = header.nextElementSibling;
            header.classList.toggle('active');
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
                content.style.padding = "0 20px";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                content.style.padding = "20px";
            }
        }

        function showPage(id) {
            const data = tours[id];
            if (!data) return;

            document.getElementById('body-main').style.backgroundColor = data.shade;
            document.getElementById('main-area').style.backgroundColor = data.shade;

            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            const linkBtn = document.getElementById('leaderboard-link');

            if (id === 'home') {
                document.getElementById('home').classList.add('active');
                if (linkBtn) linkBtn.style.display = 'none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                const view = document.getElementById('tour-view');
                const titleContainer = document.getElementById('title-container');
                
                const navBtn = document.querySelector(`.btn-${id}`);
                if (linkBtn && navBtn) {
                    linkBtn.href = data.url;
                    linkBtn.innerText = "🏆 " + (data.btnText || "Current Leaderboard");
                    linkBtn.style.display = 'block';
                    // We keep linkBtn appended to the wrapper so it stays full width below the scroll area
                }

                const oldDesc = document.getElementById('dynamic-description');
                if (oldDesc) oldDesc.remove();

                titleContainer.innerHTML = data.logo ? 
                    `<img src="${data.logo}?v=${APP_VERSION}" class="tour-logo-header">` : 
                    `<h1>${data.name}</h1>`;

                if (data.description || data.settingsImage) {
                    const descCard = document.createElement('div');
                    descCard.id = 'dynamic-description';
                    descCard.className = 'card crimson-style'; 
                    let html = "";
                    if (data.settingsImage) html += `<img src="${data.settingsImage}?v=${APP_VERSION}" style="width:100%; border-radius:8px; margin-bottom:15px;">`;
                    if (data.description) html += `<div style="white-space: pre-line;">${data.description}</div>`;
                    descCard.innerHTML = html;
                    titleContainer.after(descCard);
                }

                let arcCont = document.getElementById('archive-container');
                if (!arcCont) {
                    arcCont = document.createElement('div');
                    arcCont.id = 'archive-container';
                    view.appendChild(arcCont);
                }
                arcCont.innerHTML = '';
                if (data.archive) {
                    const h = document.createElement('div');
                    h.className = 'history-header';
                    h.innerHTML = '<h3>Tournament Archives</h3>';
                    h.onclick = function() { toggleHistory(this); };
                    const b = document.createElement('div');
                    b.className = 'history-content';
                    data.archive.forEach(item => {
                        b.innerHTML += `<a href="${item.url}" target="_blank" class="archive-sub-btn">${item.name}</a>`;
                    });
                    arcCont.appendChild(h);
                    arcCont.appendChild(b);
                }

                view.classList.add('active');
                setTimeout(() => { titleContainer.scrollIntoView({ behavior: 'smooth' }); }, 50);
            }
        }

        window.onload = () => showPage('home');
    </script>

    <style>
        body { font-family: sans-serif; transition: background-color 0.5s ease; margin: 0; padding: 0; overflow-x: hidden; }
        .container { max-width: 1000px; margin: auto; padding: 15px; }
        
        /* SCROLLING MENU CONTAINER */
        .nav-wrapper { margin-bottom: 20px; }
        
        .nav-menu { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap; 
            gap: 10px; 
            padding: 10px 5px 20px 5px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE/Edge */
            -webkit-overflow-scrolling: touch;
        }

        .nav-menu::-webkit-scrollbar { display: none; } /* Hide Chrome/Safari scrollbar */
        
        .nav-menu button { 
            flex: 0 0 auto; /* Prevents buttons from shrinking */
            min-width: 130px;
            padding: 15px 10px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            color: white; 
            background: #333;
            font-size: 0.85rem;
        }

        /* LEADERBOARD LINK: Always full width below the scroll menu */
        #leaderboard-link {
            display: none; 
            width: 100%; 
            background: white; 
            color: #333 !important; 
            padding: 15px; 
            margin: 0 auto 20px auto; 
            border-radius: 8px; 
            text-decoration: none;
            text-align: center; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 2px solid rgba(0,0,0,0.1);
            box-sizing: border-box;
            animation: fadeIn 0.3s ease-out;
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; color: #333; }
        .crimson-style { border-left: 8px solid #800000; }
        .tour-logo-header { width: 100%; max-width: 400px; display: block; margin: 0 auto 20px; }
        
        .page-content { display: none; }
        .page-content.active { display: block; }
        
        .history-header { background: #333; color: white; padding: 10px 20px; cursor: pointer; border-radius: 8px; margin-top: 10px; }
        .history-content { max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: #eee; border-radius: 0 0 8px 8px; }
        .archive-sub-btn { display: block; padding: 12px; margin: 10px; background: #666; color: white; text-decoration: none; border-radius: 5px; text-align: center; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body-main">

<div class="container" id="main-area">
    <div class="nav-wrapper">
        <div class="nav-menu">
            <button onclick="showPage('home')" style="background:#555;">Home</button>
            <button class="btn-emerald" onclick="showPage('emerald')" style="background:#004d00;">Emerald Tour</button>
            <button class="btn-grip" onclick="showPage('grip')" style="background:#b30000;">Grip & Rip</button>
            <button class="btn-links" onclick="showPage('links')" style="background:#003366;">Linksland</button>
            <button class="btn-match" onclick="showPage('match')" style="background:#4b0082;">Matchplay</button>
            <button class="btn-stable" onclick="showPage('stable')" style="background:#ff8c00;">Stableford</button>
            <button class="btn-owgr" onclick="showPage('owgr')" style="background:#222222;">LST OWGR</button>
        </div>
        <a id="leaderboard-link" target="_blank"></a>
    </div>

    <div id="home" class="page-content active">
        <div class="card">
            <h1>LST Legends Sim Tours</h1>
            <p>Scroll the menu above to select a tour. View current leaderboards, settings, and archives below.</p>
        </div>
    </div>

    <div id="tour-view" class="page-content">
        <div id="title-container"></div>
        <div id="archive-container"></div>
    </div>
</div>

</body>
</html>
