<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Sim Tours</title>
    <style>
        :root {
            --emerald: #2ecc71;
            --grip: #e67e22;
            --links: #3498db;
            --match: #e74c3c;
            --stable: #9b59b6;
            --owgr: #34495e;
            --header-bg: #ffffff;
            --bg: #f0f2f5;
            --dark-btn: #2c3e50;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg);
            color: #333;
            overflow: hidden;
        }

        /* Full Width Header */
        header.top-bar {
            height: 60px;
            background-color: var(--header-bg);
            display: flex;
            align-items: center;
            justify-content: center; /* Centers logo when visible */
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
            transition: all 0.3s ease;
        }

        .logo-container img {
            height: 40px;
        }

        /* Layout Wrapper */
        .wrapper {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* Sidebar Navigation */
        nav {
            width: 100%;
            max-width: 400px;
            margin: auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Hidden State for Navigation */
        .nav-hidden nav, .nav-hidden header.top-bar {
            display: none;
        }

        .nav-btn {
            border: none;
            color: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            text-align: center;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .nav-btn:hover { transform: translateY(-3px); opacity: 0.9; }

        .btn-emerald { background-color: var(--emerald); }
        .btn-grip { background-color: var(--grip); }
        .btn-links { background-color: var(--links); }
        .btn-match { background-color: var(--match); }
        .btn-stable { background-color: var(--stable); }
        .btn-owgr { background-color: var(--owgr); }

        /* Main Content Viewport */
        main {
            display: none; /* Hidden until a button is clicked */
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            width: 100%;
        }

        .nav-hidden main {
            display: block;
        }

        /* Controls */
        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto 30px auto;
        }

        .back-btn {
            background: #fff;
            border: 1px solid #ddd;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }

        .back-btn:hover { background: #eee; }

        .page-content {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        .page-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .content-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .leaderboard-link {
            display: inline-block;
            background-color: var(--dark-btn);
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
            min-height: 250px;
            font-size: 1.1rem;
            background: #fafafa;
        }

        .drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            background: #fafafa;
        }
    </style>
</head>
<body>

    <header class="top-bar" id="mainHeader">
        <div class="logo-container">
            <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/200x50?text=LOGO'">
        </div>
    </header>

    <div class="wrapper" id="appWrapper">
        <nav id="mainNav">
            <button class="nav-btn btn-emerald" onclick="openTour('emerald')">Emerald Tour</button>
            <button class="nav-btn btn-grip" onclick="openTour('grip')">Grip & Rip</button>
            <button class="nav-btn btn-links" onclick="openTour('links')">Linksland</button>
            <button class="nav-btn btn-match" onclick="openTour('match')">Matchplay</button>
            <button class="nav-btn btn-stable" onclick="openTour('stable')">Stableford</button>
            <button class="nav-btn btn-owgr" onclick="openTour('owgr')">LST OWGR</button>
        </nav>

        <main>
            <div class="top-controls">
                <button class="back-btn" onclick="closeTour()">← Back to Menu</button>
                <div id="dynamic-leaderboard-placeholder"></div>
            </div>

            <div id="emerald" class="page-content">
                <h1>Emerald Tour</h1>
                <div class="content-card">
                    <textarea placeholder="Tournament Notes..."></textarea>
                    <div class="drop-zone">📸 Drag imagery here</div>
                </div>
            </div>

            <div id="grip" class="page-content">
                <h1>Grip & Rip</h1>
                <div class="content-card">
                    <textarea placeholder="Tournament Notes..."></textarea>
                    <div class="drop-zone">📸 Drag imagery here</div>
                </div>
            </div>

            <div id="links" class="page-content">
                <h1>Linksland</h1>
                <div class="content-card">
                    <textarea placeholder="Tournament Notes..."></textarea>
                    <div class="drop-zone">📸 Drag imagery here</div>
                </div>
            </div>

            <div id="match" class="page-content">
                <h1>Matchplay</h1>
                <div class="content-card">
                    <textarea placeholder="Tournament Notes..."></textarea>
                    <div class="drop-zone">📸 Drag imagery here</div>
                </div>
            </div>

            <div id="stable" class="page-content">
                <h1>Stableford</h1>
                <div class="content-card">
                    <textarea placeholder="Tournament Notes..."></textarea>
                    <div class="drop-zone">📸 Drag imagery here</div>
                </div>
            </div>

            <div id="owgr" class="page-content">
                <h1>LST OWGR</h1>
                <div class="content-card">
                    <textarea placeholder="Rankings updates..."></textarea>
                    <div class="drop-zone">📸 Drag screenshots here</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const links = {
            emerald: "https://lst-2k.github.io/newemeraldtourseason2/",
            grip: "https://geordieboy85.github.io/GripRipRebirth74Leaderboards/",
            links: "https://lst-2k.github.io/linksland/",
            match: "https://lst-2k.github.io/matchplay/",
            stable: "https://lst-2k.github.io/stableford/",
            owgr: "https://lst-2k.github.io/lst-owgr/"
        };

        function openTour(tourId) {
            // Hide Menu, Show Main
            document.body.classList.add('nav-hidden');
            
            // Activate Content
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(tourId).classList.add('active');

            // Set Leaderboard Link
            const linkArea = document.getElementById('dynamic-leaderboard-placeholder');
            linkArea.innerHTML = `<a href="${links[tourId]}" target="_blank" class="leaderboard-link">Current Leaderboard</a>`;
        }

        function closeTour() {
            document.body.classList.remove('nav-hidden');
        }
    </script>
</body>
</html>
